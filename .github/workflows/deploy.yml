name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm install

      # Push secrets from the org vault into the worker — bulk upload before
      # deploying so the new deployment boots with everything wired.
      - name: Sync worker secrets from org vault
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '.'
          secrets: |
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            JWT_SECRET
            RESEND_API_KEY
            TELNYX_API_KEY
            TELNYX_CONNECTION_ID
            TELNYX_PHONE_NUMBER
            TELNYX_PUBLIC_KEY
            ELEVENLABS_API_KEY
            ELEVEN_LABS_VOICE_ID
            SENTRY_DSN
            DATABASE_URL
            CLOUDFLARE_API
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_CONNECTION_ID: ${{ secrets.TELNYX_CONNECTION_ID }}
          TELNYX_PHONE_NUMBER: ${{ secrets.TELNYX_PHONE_NUMBER }}
          TELNYX_PUBLIC_KEY: ${{ secrets.TELNYX_PUBLIC_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVEN_LABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_CYPHER }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_CYPHER_HEALING }}
          DATABASE_URL: ${{ secrets.NEON_CONNECTION_STRING }}
          CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy backend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: '.'

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm install

      - name: Build frontend
        working-directory: ./web
        env:
          VITE_API_URL: https://api.cypherofhealing.com/api
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
        run: npm run build

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name coh
          workingDirectory: './web'

      - name: Verify backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.cypherofhealing.com/)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Backend healthy: HTTP $STATUS"

      - name: Deployment notification
        if: success()
        run: |
          echo "Deployment successful"
          echo "Backend: https://api.cypherofhealing.com"
          echo "Frontend: https://cypherofhealing.com"

      - name: Deployment failure notification
        if: failure()
        run: echo "Deployment failed. Check the logs above."
